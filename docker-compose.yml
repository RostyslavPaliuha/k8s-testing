services:
  service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: service
    ports:
      - "8081:8081"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/v1/data"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
