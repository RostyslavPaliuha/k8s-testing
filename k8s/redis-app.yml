apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-cache
  namespace: argocd
spec:
  project: default
  source:
    chart: redis
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 18.x.x
    helm:
      values: |
        image:
          tag: latest
        architecture: standalone
        auth:
          enabled: true
          password: "YourSecurePassword"
        master:
          persistence:
            enabled: true
            size: 5Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: default # Or your target namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true