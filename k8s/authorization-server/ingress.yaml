apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authorization-server-ingress
  namespace: authorization-server-ns
spec:
  ingressClassName: nginx
  rules:
    - host: clients.dev.vidmind.com
      http:
        paths:
          - path: /authorization
            pathType: Prefix
            backend:
              service:
                name: authorization-server
                port:
                  name: http
