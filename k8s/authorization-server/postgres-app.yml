apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-db
  namespace: argocd
spec:
  project: default
  source:
    chart: postgresql
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 15.x.x
    helm:
      values: |
        auth:
          postgresPassword: "postgres"
          database: "auth_server"
          username: "postgres"
          password: "postgres"
        global:
          storageClass: "hostpath"
        image:
          registry: docker.io
          repository: bitnamilegacy/postgresql
          tag: "17.6.0-debian-12-r4"
        primary:
          persistence:
            enabled: true
            mountPath: /bitnami/postgresql
            size: 8Gi
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: authorization-server-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true