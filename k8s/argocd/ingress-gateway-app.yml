apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-gateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/RostyslavPaliuha/k8s-testing
    targetRevision: master
    path: k8s/ingress-gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-gateway-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
