apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resource-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/RostyslavPaliuha/k8s-testing
    targetRevision: master
    path: k8s/resource-server
  destination:
    server: https://kubernetes.default.svc
    namespace: service-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true