apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-gateway-ingress
  namespace: ingress-gateway-ns
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ingress-gateway
                port:
                  name: http
