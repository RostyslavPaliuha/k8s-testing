apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-db
  namespace: argocd
spec:
  project: default
  source:
    chart: postgresql
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 15.x.x # Targets Postgres 16/17 series
    helm:
      values: |
        global:
          postgresql:
            auth:
              database: "auth_db"
              username: "admin"
              password: "YourSecurePassword"
          storageClass: "hostpath"
          image:
            registry: "docker.io/bitnamilegacy"
        primary:
          persistence:
            enabled: true
            mountPath: /bitnami/postgresql
            size: 8Gi
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true